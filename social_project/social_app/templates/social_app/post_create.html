{% extends "social_app/base.html" %}

{% block title %}Create New Post{% endblock %}

{% block content %}
<div class="create-post-container">
    <h2 class="create-post-title">📝 Create New Post</h2>
    
    <div class="post-card create-post-card">
        <form method="post" action="{% url 'post_create' %}">
            {% csrf_token %}

            <label for="{{ form.content.id_for_label }}" class="form-label">
                What's on your mind?
            </label>
            {{ form.content }}

            {% if form.errors %}
                <div class="form-error">
                    {{ form.errors }}
                </div>
            {% endif %}

            <button type="submit" class="post-btn">Post</button>
        </form>
    </div>
</div>

<style>
/* 🌟 Create Post Page Styling 🌟 */

body {
    background: #f4f6fa;
    font-family: "Inter", sans-serif;
}

/* Container */
.create-post-container {
    max-width: 600px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
}

/* Title */
.create-post-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #222;
    margin-bottom: 25px;
}

/* Card */
.post-card.create-post-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
    padding: 25px 30px;
    text-align: left;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.post-card.create-post-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
}

/* Label */
.form-label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
}

/* Textarea */
textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s ease;
}

textarea:focus {
    border-color: #0077ff;
    box-shadow: 0 0 4px rgba(0, 102, 255, 0.2);
}

/* Error */
.form-error {
    color: #e63946;
    font-size: 0.9rem;
    margin-top: 10px;
}

/* Post Button */
.post-btn {
    display: inline-block;
    background: linear-gradient(135deg, #0077ff, #005fd1);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s ease;
}

.post-btn:hover {
    background: linear-gradient(135deg, #005fd1, #004bb5);
}

/* Responsive */
@media (max-width: 600px) {
    .create-post-container {
        margin: 30px auto;
        padding: 0 15px;
    }

    .create-post-title {
        font-size: 1.5rem;
    }

    .post-card.create-post-card {
        padding: 20px;
    }
}
</style>
{% endblock %}
